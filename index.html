<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Conflict Style Assessment</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Conflict Style">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    /* Home Screen */
    .home-screen {
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .title {
      font-size: 28px;
      font-weight: bold;
      color: #f8fafc;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      font-size: 16px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 40px;
      padding: 0 20px;
    }
    .btn {
      width: 100%;
      max-width: 400px;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 15px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background-color: #6366f1; }
    .btn-secondary { background-color: #334155; }
    .btn-outline {
      background-color: transparent;
      border: 2px solid #334155;
      color: #f8fafc;
      margin-top: 10px;
    }

    /* Quiz Screen */
    .quiz-screen {
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .progress-bar-container {
      width: 100%;
      max-width: 400px;
      height: 8px;
      background-color: #334155;
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background-color: #6366f1;
      transition: width 0.3s ease;
    }
    .legend-text {
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 30px;
      background-color: #1e293b;
      padding: 8px 15px;
      border-radius: 8px;
    }
    .progress-text {
      color: #6366f1;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
    }
    .question-card {
      background-color: #1e293b;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      min-height: 150px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
      border: 1px solid #334155;
    }
    .question {
      color: #f8fafc;
      font-size: 20px;
      text-align: center;
      line-height: 28px;
    }
    .options-container {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      padding: 0 10px;
    }
    .circle {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: 2px solid #475569;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f172a;
      color: #f8fafc;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .circle:hover {
      background-color: #6366f1;
      border-color: #6366f1;
      transform: scale(1.1);
    }
    .circle.selected {
      background-color: #6366f1;
      border-color: #6366f1;
      transform: scale(1.1);
    }

    /* Quiz Navigation */
    .quiz-top-row {
      width: 100%;
      max-width: 400px;
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .cancel-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .cancel-btn:hover { color: #f87171; }
    .quiz-nav-row {
      width: 100%;
      max-width: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      position: relative;
      min-height: 32px;
    }
    .nav-btn {
      background: none;
      border: 1px solid #475569;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 16px;
      border-radius: 8px;
      transition: all 0.2s;
      position: absolute;
    }
    .nav-btn:hover { color: #f8fafc; border-color: #6366f1; }
    .nav-btn.prev { left: 0; }
    .nav-btn.next { right: 0; }

    /* Results Screen */
    .results-screen {
      padding: 20px;
      align-items: center;
      overflow-y: auto;
    }
    .primary-card {
      background-color: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 15px;
      border: 1px solid #6366f1;
    }
    .primary-title {
      color: #f8fafc;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .primary-desc {
      color: #cbd5e1;
      font-size: 16px;
      line-height: 24px;
      margin-bottom: 15px;
    }
    .bullet-item {
      color: #e0e7ff;
      font-size: 15px;
      line-height: 22px;
      margin-bottom: 8px;
      padding-left: 10px;
    }
    .link-button {
      background-color: #4f46e5;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin-top: 10px;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: opacity 0.2s;
    }
    .link-button:hover { opacity: 0.85; }
    .secondary-card {
      background-color: #0f172a;
      padding: 20px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
      border: 1px solid #475569;
    }
    .secondary-title {
      color: #f8fafc;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .secondary-desc {
      color: #94a3b8;
      font-size: 15px;
      line-height: 22px;
      margin-bottom: 15px;
    }
    .bullet-item-secondary {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 20px;
      margin-bottom: 6px;
      padding-left: 10px;
    }
    .score-board {
      width: 100%;
      max-width: 500px;
      background-color: #1e293b;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #334155;
    }
    .score-row:last-child { border-bottom: none; }
    .score-label { color: #f8fafc; font-size: 16px; font-weight: 500; }
    .score-value { color: #94a3b8; font-size: 16px; font-weight: bold; }

    /* History Screen */
    .history-screen {
      padding: 20px;
      align-items: center;
      overflow-y: auto;
    }
    .history-toolbar {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 15px;
    }
    .toolbar-btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .toolbar-btn:hover { opacity: 0.85; }
    .btn-danger { background-color: #ef4444; color: white; }
    .btn-danger-outline { background-color: transparent; border: 2px solid #ef4444; color: #ef4444; }
    .history-tiles {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .history-tile {
      background-color: #1e293b;
      padding: 16px 16px 16px 20px;
      border-radius: 12px;
      border: 1px solid #334155;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
    }
    .history-tile:hover { border-color: #6366f1; }
    .history-tile.tile-selected {
      border-color: #6366f1;
      background-color: #1e2d4a;
    }
    .tile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .tile-date { color: #94a3b8; font-size: 13px; }
    .tile-attempt { color: #6366f1; font-size: 13px; font-weight: 600; }
    .tile-primary {
      color: #f8fafc;
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .tile-scores {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tile-score-chip {
      background-color: #0f172a;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    .tile-checkbox {
      position: absolute;
      left: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #475569;
      background-color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
      cursor: pointer;
      z-index: 2;
    }
    .tile-checkbox.checked {
      background-color: #6366f1;
      border-color: #6366f1;
    }
    .tile-checkbox.checked::after {
      content: '\2713';
      color: white;
      font-size: 14px;
      font-weight: bold;
    }
    /* Desktop: show checkbox on hover */
    @media (hover: hover) {
      .history-tile:hover .tile-checkbox,
      .history-tile.tile-selected .tile-checkbox {
        opacity: 1;
      }
    }
    /* When in select mode, always show checkboxes */
    .history-tiles.select-mode .tile-checkbox {
      opacity: 1;
    }
    .history-empty {
      color: #64748b;
      font-size: 16px;
      text-align: center;
      margin-top: 40px;
    }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background-color: #1e293b;
      border: 1px solid #475569;
      border-radius: 10px;
      padding: 6px 0;
      min-width: 160px;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      display: none;
    }
    .context-menu.visible { display: block; }
    .context-menu-item {
      padding: 10px 18px;
      color: #f8fafc;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.1s;
    }
    .context-menu-item:hover { background-color: #334155; }
    .context-menu-item.danger { color: #f87171; }
    .context-menu-item.danger:hover { background-color: #3b1a1a; }
  </style>
</head>
<body>

  <!-- Home Screen -->
  <div id="home-screen" class="screen home-screen active">
    <h1 class="title">Conflict Style Assessment</h1>
    <p class="subtitle">Discover how you naturally navigate disagreements and collaboration.</p>
    <button class="btn btn-primary" onclick="startQuiz()">Start New Assessment</button>
    <button class="btn btn-secondary" id="view-past-btn" style="display:none;" onclick="viewPastResults()">View Past Results</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" class="screen quiz-screen">
    <div class="quiz-top-row">
      <button class="cancel-btn" onclick="cancelQuiz()">&#x2715; Cancel</button>
      <div class="progress-bar-container" style="margin-bottom:0; flex:1; margin-left:10px;">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
    <div class="legend-text">1: Never | 2: Seldom | 3: Sometimes | 4: Often | 5: Always</div>
    <div class="quiz-nav-row">
      <button class="nav-btn prev" id="prev-btn" onclick="goBack()" style="display:none;">&#8592; Previous</button>
      <div class="progress-text" id="progress-text"></div>
      <button class="nav-btn next" id="next-btn" onclick="goNext()" style="display:none;">Next &#8594;</button>
    </div>
    <div class="question-card">
      <div class="question" id="question-text"></div>
    </div>
    <div class="options-container">
      <div class="circle" id="circle-1" onclick="handleSelect(1)">1</div>
      <div class="circle" id="circle-2" onclick="handleSelect(2)">2</div>
      <div class="circle" id="circle-3" onclick="handleSelect(3)">3</div>
      <div class="circle" id="circle-4" onclick="handleSelect(4)">4</div>
      <div class="circle" id="circle-5" onclick="handleSelect(5)">5</div>
    </div>
  </div>

  <!-- Results Screen -->
  <div id="results-screen" class="screen results-screen">
    <h1 class="title">Assessment Results</h1>
    <div id="results-content"></div>
    <button class="btn btn-outline" id="results-back-btn" onclick="resultsGoBack()" style="max-width:500px;">Return to Home</button>
  </div>

  <!-- History Screen -->
  <div id="history-screen" class="screen history-screen">
    <h1 class="title">Past Results</h1>
    <div class="history-toolbar" id="history-toolbar">
      <button class="toolbar-btn btn-danger-outline" id="delete-selected-btn" style="display:none;" onclick="deleteSelectedResults()">Delete Selected</button>
      <button class="toolbar-btn btn-danger" onclick="deleteAllResults()">Delete All</button>
    </div>
    <div class="history-tiles" id="history-tiles"></div>
    <button class="btn btn-outline" onclick="reset()" style="max-width:500px;">Return to Home</button>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="context-menu">
    <div class="context-menu-item" id="ctx-select" onclick="ctxSelect()">Select</div>
    <div class="context-menu-item danger" id="ctx-delete" onclick="ctxDelete()">Delete</div>
  </div>

  <script>
    const questions = [
      "When a disagreement arises, I prefer to stay quiet and keep my opinions to myself to avoid the spotlight.",
      "I strongly push to get my own way, even if it means stepping on a few toes.",
      "I suggest meeting halfway so that we can wrap up the conflict quickly and move on.",
      "I often set aside my own goals to make sure the other person gets what they want.",
      "I dig deep into the root cause of the problem to find a creative solution that fully satisfies us both.",
      "I actively steer conversations away from topics that I know might cause an argument.",
      "I rely on my authority, rank, or leverage to make sure the final decision goes my way.",
      "When we are deadlocked, I look for a quick trade-off where we each give up a little bit.",
      "I go along with the other person's ideas, even if I secretly disagree with them.",
      "I actively combine my ideas with the other person's thoughts to build a completely new, shared plan.",
      "I will physically or emotionally distance myself from a situation if tension starts to build.",
      "I use my specialized knowledge or experience to outmaneuver others and win the argument.",
      "I believe fair is fair, so I try to find a solution where we both get exactly half of what we want.",
      "I'd rather just give in and agree than expend the energy to keep fighting over something.",
      "I refuse to settle until we have brainstormed an outcome where neither of us feels like we sacrificed anything.",
      "I bite my tongue when someone does something that upsets me so I don't hurt their feelings.",
      "Once I've made up my mind on an issue, I am determined to convince the other person I am right.",
      "I am willing to sacrifice some of my demands if the other person is willing to do the same.",
      "I find myself yielding to the other person's suggestions just to maintain harmony in the relationship.",
      "I share all my underlying concerns honestly and encourage them to do the same so we can tackle the issue as a team.",
      "I put off having difficult conversations for as long as possible.",
      "I treat disagreements like a game or a battle where my primary goal is to come out on top.",
      "I actively try to strike a bargain, focusing on 'give and take' rather than getting everything perfect.",
      "I prioritize keeping the peace, so I bend over backwards to meet the other person's expectations.",
      "I bring all hidden issues out into the open, no matter how uncomfortable, so we can address everything thoroughly."
    ];

    const descriptions = {
      Avoiding: "Sidestepping conflict. Useful for trivial issues, but can lead to unresolved tension.",
      Dominating: "Firm and assertive. Highly effective in crises or when standing up for boundaries, but can strain teamwork.",
      Compromising: "Seeking the middle ground. Values fairness and expediency, requiring both sides to give something up.",
      Obliging: "Putting others first. Builds social capital and harmony, but risks leaving your own needs unmet.",
      Integrating: "Collaborating for win-win solutions. Takes time and trust, but results in the strongest resolutions."
    };

    const STORAGE_KEY = 'conflict_scores_history';
    let currentIdx = 0;
    let answers = new Array(25).fill(null);
    let maxAnswered = -1;
    let resultHistory = [];
    let selectedTiles = new Set();
    let ctxTargetIdx = null;
    let longPressTimer = null;
    let cameFromHistory = false;

    function loadHistory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          resultHistory = JSON.parse(saved);
        }
        // Migrate old single-result format
        const oldSaved = localStorage.getItem('conflict_scores');
        if (oldSaved) {
          const old = JSON.parse(oldSaved);
          if (old && old.scores) {
            if (!old.id) old.id = Date.now();
            resultHistory.unshift(old);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(resultHistory));
            localStorage.removeItem('conflict_scores');
          }
        }
      } catch (e) {
        console.log("Failed to load data.");
      }
      updateHomeBtn();
    }

    function updateHomeBtn() {
      const btn = document.getElementById('view-past-btn');
      if (resultHistory.length > 0) {
        btn.style.display = 'block';
        btn.textContent = `View Past Results (${resultHistory.length})`;
      } else {
        btn.style.display = 'none';
      }
    }

    function saveHistory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(resultHistory));
      } catch (e) {
        console.log("Failed to save data.");
      }
    }

    function addResult(result) {
      result.id = Date.now();
      resultHistory.unshift(result);
      saveHistory();
    }

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(name + '-screen').classList.add('active');
    }

    function startQuiz() {
      currentIdx = 0;
      answers = new Array(25).fill(null);
      maxAnswered = -1;
      updateQuizUI();
      showScreen('quiz');
    }

    function updateQuizUI() {
      document.getElementById('progress-bar').style.width = `${((maxAnswered + 1) / 25) * 100}%`;
      document.getElementById('progress-text').textContent = `Question ${currentIdx + 1} of 25`;
      document.getElementById('question-text').textContent = questions[currentIdx];

      // Show/hide Previous button
      document.getElementById('prev-btn').style.display = currentIdx > 0 ? 'block' : 'none';

      // Show Next button only if current question already answered and not the last answered
      const hasAnswer = answers[currentIdx] !== null;
      const canGoNext = hasAnswer && currentIdx < 24 && currentIdx <= maxAnswered;
      document.getElementById('next-btn').style.display = canGoNext ? 'block' : 'none';

      // Highlight selected circle
      for (let i = 1; i <= 5; i++) {
        const el = document.getElementById('circle-' + i);
        if (answers[currentIdx] === i) {
          el.classList.add('selected');
        } else {
          el.classList.remove('selected');
        }
      }
    }

    function handleSelect(value) {
      answers[currentIdx] = value;
      if (currentIdx > maxAnswered) maxAnswered = currentIdx;
      if (currentIdx < 24) {
        currentIdx++;
        updateQuizUI();
      } else {
        finishQuiz();
      }
    }

    function goBack() {
      if (currentIdx > 0) {
        currentIdx--;
        updateQuizUI();
      }
    }

    function goNext() {
      if (answers[currentIdx] !== null && currentIdx < 24) {
        currentIdx++;
        updateQuizUI();
      }
    }

    function cancelQuiz() {
      currentIdx = 0;
      answers = new Array(25).fill(null);
      maxAnswered = -1;
      loadHistory();
      showScreen('home');
    }

    function finishQuiz() {
      const scores = { Avoiding: 0, Dominating: 0, Compromising: 0, Obliging: 0, Integrating: 0 };
      answers.forEach((val, i) => {
        if (val === null) return;
        const qNum = i + 1;
        if ([1, 6, 11, 16, 21].includes(qNum)) scores.Avoiding += val;
        else if ([2, 7, 12, 17, 22].includes(qNum)) scores.Dominating += val;
        else if ([3, 8, 13, 18, 23].includes(qNum)) scores.Compromising += val;
        else if ([4, 9, 14, 19, 24].includes(qNum)) scores.Obliging += val;
        else if ([5, 10, 15, 20, 25].includes(qNum)) scores.Integrating += val;
      });

      const maxScore = Math.max(...Object.values(scores));
      const primaries = Object.keys(scores).filter(k => scores[k] === maxScore);
      const secondaries = Object.keys(scores).filter(k => scores[k] >= maxScore - 3 && scores[k] < maxScore);

      const result = { scores, primaries, secondaries, date: new Date().toLocaleDateString() };
      addResult(result);
      cameFromHistory = false;
      showResults(result);
    }

    function showResults(result) {
      const { scores, primaries, secondaries } = result;
      let html = '';

      // Primary card
      html += '<div class="primary-card">';
      html += `<div class="primary-title">Primary Style${primaries.length > 1 ? 's' : ''}: ${primaries.join(' & ')}</div>`;

      if (primaries.length > 1) {
        html += '<div class="primary-desc">You tied for multiple dominant styles. This indicates high adaptability. You likely shift your approach depending on the specific conflict, the stakes involved, or how much energy you have at the moment.</div>';
        primaries.forEach(p => {
          html += `<div class="bullet-item">&bull; ${p}: ${descriptions[p]}</div>`;
        });
      } else {
        html += `<div class="primary-desc">${descriptions[primaries[0]]}</div>`;
      }

      primaries.forEach(p => {
        html += `<button class="link-button" onclick="openLearnMore('${p}')">Learn about ${p} &rarr;</button>`;
      });
      html += '</div>';

      // Secondary card
      if (secondaries.length > 0) {
        html += '<div class="secondary-card">';
        html += `<div class="secondary-title">Close Fallbacks: ${secondaries.join(', ')}</div>`;
        html += '<div class="secondary-desc">Scoring within 3 points of your dominant style means these are strong secondary strategies. You likely pivot to these naturally when your primary approach hits a wall or when dealing with specific types of people.</div>';
        secondaries.forEach(s => {
          html += `<div class="bullet-item-secondary">&bull; ${s}: ${descriptions[s]}</div>`;
        });
        html += '</div>';
      }

      // Score board
      html += '<div class="score-board">';
      Object.keys(scores).forEach(key => {
        html += `<div class="score-row"><span class="score-label">${key}</span><span class="score-value">${scores[key]} / 25</span></div>`;
      });
      html += '</div>';

      document.getElementById('results-content').innerHTML = html;
      document.getElementById('results-back-btn').textContent = cameFromHistory ? 'Back to Past Results' : 'Return to Home';
      showScreen('results');
    }

    function resultsGoBack() {
      if (cameFromHistory) {
        cameFromHistory = false;
        viewPastResults();
      } else {
        reset();
      }
    }

    function openLearnMore(style) {
      const url = `https://www.google.com/search?q=Thomas+Kilmann+${encodeURIComponent(style)}+Conflict+Management+Style`;
      try {
        const { shell } = require('electron');
        shell.openExternal(url);
      } catch (e) {
        window.open(url, '_blank');
      }
    }

    function viewPastResults() {
      selectedTiles.clear();
      renderHistoryTiles();
      showScreen('history');
    }

    function renderHistoryTiles() {
      const container = document.getElementById('history-tiles');
      const delSelBtn = document.getElementById('delete-selected-btn');
      delSelBtn.style.display = selectedTiles.size > 0 ? 'inline-block' : 'none';

      if (resultHistory.length === 0) {
        container.innerHTML = '<div class="history-empty">No past results yet.</div>';
        return;
      }

      container.className = 'history-tiles' + (selectedTiles.size > 0 ? ' select-mode' : '');
      let html = '';
      resultHistory.forEach((r, i) => {
        const isSelected = selectedTiles.has(i);
        html += `<div class="history-tile${isSelected ? ' tile-selected' : ''}" data-index="${i}"
          onclick="handleTileClick(event, ${i})"
          oncontextmenu="handleTileContext(event, ${i})"
          ontouchstart="handleTouchStart(event, ${i})"
          ontouchend="handleTouchEnd(event)"
          ontouchmove="handleTouchEnd(event)">`;
        html += `<div class="tile-checkbox${isSelected ? ' checked' : ''}" onclick="toggleTileSelect(event, ${i})"></div>`;
        html += `<div class="tile-header">`;
        html += `<span class="tile-attempt">Attempt #${resultHistory.length - i}</span>`;
        html += `<span class="tile-date">${r.date}</span>`;
        html += `</div>`;
        html += `<div class="tile-primary">${r.primaries.join(' & ')}</div>`;
        html += `<div class="tile-scores">`;
        Object.keys(r.scores).forEach(key => {
          html += `<span class="tile-score-chip">${key}: ${r.scores[key]}</span>`;
        });
        html += `</div></div>`;
      });
      container.innerHTML = html;
    }

    // --- Tile interactions ---

    function handleTileClick(e, idx) {
      if (e.defaultPrevented) return;
      // If in select mode, toggle selection
      if (selectedTiles.size > 0) {
        toggleTileSelectByIdx(idx);
        return;
      }
      // Normal click: view that result
      cameFromHistory = true;
      showResults(resultHistory[idx]);
    }

    function toggleTileSelect(e, idx) {
      e.preventDefault();
      e.stopPropagation();
      toggleTileSelectByIdx(idx);
    }

    function toggleTileSelectByIdx(idx) {
      if (selectedTiles.has(idx)) {
        selectedTiles.delete(idx);
      } else {
        selectedTiles.add(idx);
      }
      renderHistoryTiles();
    }

    // Desktop right-click
    function handleTileContext(e, idx) {
      e.preventDefault();
      ctxTargetIdx = idx;
      const menu = document.getElementById('context-menu');
      menu.style.left = e.clientX + 'px';
      menu.style.top = e.clientY + 'px';
      menu.classList.add('visible');
    }

    // Mobile long-press
    function handleTouchStart(e, idx) {
      longPressTimer = setTimeout(() => {
        longPressTimer = null;
        e.preventDefault();
        ctxTargetIdx = idx;
        const touch = e.touches[0];
        const menu = document.getElementById('context-menu');
        menu.style.left = touch.clientX + 'px';
        menu.style.top = touch.clientY + 'px';
        menu.classList.add('visible');
      }, 500);
    }

    function handleTouchEnd(e) {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    function ctxSelect() {
      if (ctxTargetIdx !== null) {
        if (!selectedTiles.has(ctxTargetIdx)) {
          selectedTiles.add(ctxTargetIdx);
        }
        renderHistoryTiles();
      }
      hideContextMenu();
    }

    function ctxDelete() {
      if (ctxTargetIdx !== null) {
        resultHistory.splice(ctxTargetIdx, 1);
        saveHistory();
        selectedTiles.clear();
        if (resultHistory.length === 0) {
          reset();
          return;
        }
        renderHistoryTiles();
      }
      hideContextMenu();
    }

    function hideContextMenu() {
      document.getElementById('context-menu').classList.remove('visible');
      ctxTargetIdx = null;
    }

    // Close context menu on click elsewhere
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.context-menu')) hideContextMenu();
    });

    function deleteSelectedResults() {
      // Sort descending so splice indices stay valid
      const indices = Array.from(selectedTiles).sort((a, b) => b - a);
      indices.forEach(i => resultHistory.splice(i, 1));
      saveHistory();
      selectedTiles.clear();
      if (resultHistory.length === 0) {
        reset();
        return;
      }
      renderHistoryTiles();
    }

    function deleteAllResults() {
      resultHistory = [];
      saveHistory();
      selectedTiles.clear();
      reset();
    }

    function reset() {
      currentIdx = 0;
      answers = new Array(25).fill(null);
      maxAnswered = -1;
      loadHistory();
      showScreen('home');
    }

    // Keyboard support for quiz
    document.addEventListener('keydown', function(e) {
      // Only respond when quiz screen is active
      if (!document.getElementById('quiz-screen').classList.contains('active')) return;
      const key = e.key;
      if (key >= '1' && key <= '5') {
        handleSelect(parseInt(key));
      } else if (key === 'ArrowLeft' && currentIdx > 0) {
        goBack();
      } else if (key === 'ArrowRight' && answers[currentIdx] !== null && currentIdx < 24) {
        goNext();
      } else if (key === 'Escape') {
        cancelQuiz();
      }
    });

    // Initialize
    loadHistory();

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
